services:
  expo:
    build:
      context: .
      dockerfile: dockerfile
    container_name: fithealth_expo_dev
    working_dir: /usr/src/app
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      EXPO_NO_TELEMETRY: "1"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./FitHealth:/usr/src/app
      - /usr/src/app/node_modules
    command: ["npx", "expo", "start", "--port", "8081", "--host", "lan", "--clear"]
